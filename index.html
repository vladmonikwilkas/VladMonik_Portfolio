<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Три блока</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow-y: hidden;
        }

        body {
            overflow-x: hidden;
        }

        .block {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .block img,
        .block video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            /* Центрируем картинку, чтобы на мобилках не обрезало самое важное */
        }

        .content {
            position: absolute;
            bottom: 15%;
            /* Опускаем блок вниз */
            z-index: 1;
            color: white;
            text-align: center;
            padding: 30px 40px;
            background: rgba(0, 0, 0, 0.7);
            /* Делаем фон чуть темнее для контраста */
            border-radius: 15px;
            max-width: 90%;
            width: fit-content;
        }

        .content h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-family: Arial, sans-serif;
        }

        .content p {
            font-size: 2.5rem;
            /* Сильно увеличиваем шрифт */
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
            /* Добавляем тень для пущей читаемости */
            font-family: Arial, sans-serif;
        }

        /* Блок 1 - светлый фон */
        .block-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Блок 2 - тёмный фон */
        .block-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Блок 3 - видео */
        .block-3 {
            background: #000;
        }

        .scroll-btn {
            position: absolute;
            bottom: 40px;
            /* Было 30px, немного подняли базово */
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* Медиа-запросы для мобильных устройств (чтобы кнопки и текст не уезжали за экран) */
        @media (max-width: 768px) {
            .scroll-btn {
                bottom: 60px;
                /* На телефонах поднимаем кнопку еще выше, чтобы не перекрывалась панелью браузера */
            }

            .content p {
                font-size: 1.8rem;
                /* На телефоне шрифт чуть поменьше, чтобы влезал на экран */
            }

            .content {
                bottom: 20%;
                /* Текст поднимаем чуть повыше от кнопки на мобилках */
                padding: 20px;
            }
        }

        .scroll-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateX(-50%) scale(1.1);
        }

        .scroll-btn::after {
            content: "↓";
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- Блок 1: Текст + картинка -->
    <section class="block block-1" id="block1">
        <img src="" alt="Фон 1" id="img1">
        <div class="content">
            <h1 id="title1" style="display:none;"></h1>
            <p>Ваш текст здесь</p>
        </div>
        <button class="scroll-btn" onclick="scrollToBlock(2)"></button>
    </section>

    <!-- Блок 2: Текст + картинка -->
    <section class="block block-2" id="block2">
        <img src="" alt="Фон 2" id="img2">
        <div class="content">
            <h1 id="title2" style="display:none;"></h1>
            <p>Ваш текст здесь</p>
        </div>
        <button class="scroll-btn" onclick="scrollToBlock(3)"></button>
    </section>

    <!-- Блок 3: Авто-видео -->
    <section class="block block-3" id="block3">
        <video id="video3" loop playsinline>
            <source src="" type="video/mp4" id="videoSource">
            Ваш браузер не поддерживает видео.
        </video>
        <!-- Кнопка теперь ведет на 4-й блок (визуально вниз) -->
        <button class="scroll-btn" onclick="scrollToBlock(4)"></button>
        <button id="playBtn"
            style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:2; padding:20px 50px; font-size:28px; background:rgba(0,0,0,0.85); color:white; border:3px solid white; cursor:pointer; font-weight:bold; border-radius:10px;">посмотреть
            портфолио</button>
    </section>

    <!-- Блок 4: Технический клон Блока 2 для иллюзии бесконечности -->
    <section class="block block-2" id="block4">
        <img src="" alt="Фон 4" id="img4">
        <div class="content">
            <h1 id="title4">Портфолио</h1>
            <p id="text4">Листайте дальше...</p>
        </div>
        <button class="scroll-btn" onclick="scrollToBlock(3)"></button>
    </section>

    <script src="phrases.js"></script>
    <script>
        const video = document.getElementById('video3');
        const playBtn = document.getElementById('playBtn');
        let currentBlock = 1;

        // Логика картинок и текстов
        let imgIndex = 0; // Теперь стартуем с 0 индекса из массива loopImages
        let textIndex = 0;

        // Инициализация при загрузке: берем ВСЕ данные из phrases.js
        if (typeof initialPhrases !== 'undefined') {
            document.querySelector('#block1 p').innerText = initialPhrases.block1;
            document.querySelector('#block2 p').innerText = initialPhrases.block2;

            // Устанавливаем стартовые картинки
            document.getElementById('img1').src = startImages.block1;
            document.getElementById('img2').src = startImages.block2;
            document.getElementById('img4').src = startImages.block2; // Блок 4 это изначально клон Блока 2

            // Устанавливаем видео
            document.getElementById('videoSource').src = videoFileName;
            video.load(); // Важно! Перезагружаем видео, чтобы браузер подхватил новый src
        }

        // Блокируем скролл колёсиком, тачем и клавиатурой
        window.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
        window.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'PageUp', 'PageDown', 'Home', 'End'].includes(e.key)) {
                e.preventDefault();
            }
        });

        function scrollToBlock(blockNumber) {
            // Логика для бесконечного цикла (переход 3 -> 4)
            if (currentBlock === 3 && blockNumber === 4) {
                video.pause();
                video.currentTime = 0;
                playBtn.style.display = 'block'; // Возвращаем кнопку Play

                // 1. Скроллим вниз к 4-му блоку (плавно)
                document.getElementById('block4').scrollIntoView({ behavior: 'smooth' });

                // 2. Ждем окончания анимации (800мс), затем телепортируем на Блок 2
                setTimeout(() => {
                    // Синхронизируем Блок 2 с Блоком 4 (на котором мы сейчас)
                    // Блок 4 уже содержит новую картинку, которую мы поставили на шаге 2->3
                    const currentImgSrc = document.querySelector('#block4 img').src;
                    document.querySelector('#block2 img').src = currentImgSrc;

                    // Синхронизируем текст (копируем с 4-го на 2-й)
                    const title2 = document.querySelector('#block2 h1');
                    const title4 = document.querySelector('#block4 h1');
                    title2.innerText = title4.innerText;
                    title2.style.display = 'block';
                    document.querySelector('#block2 p').innerText = document.querySelector('#block4 p').innerText;

                    // Мгновенный прыжок назад на Блок 2 (без анимации)
                    document.getElementById('block2').scrollIntoView({ behavior: 'auto' });
                    currentBlock = 2;
                }, 800);

                return; // Прерываем функцию, так как мы обработали переход вручную
            }

            // При переходе 2→3 показываем кнопку
            if (currentBlock === 2 && blockNumber === 3) {
                video.currentTime = 0;
                video.pause();
                playBtn.style.display = 'block';

                // ЗАРАНЕЕ готовим следующую картинку на 4-м блоке из массива loopImages
                imgIndex = (imgIndex + 1) % loopImages.length;
                document.querySelector('#block4 img').src = loopImages[imgIndex];
                console.log('Загружаю картинку:', loopImages[imgIndex]); // Для проверки (F12 -> Console)

                // ЗАРАНЕЕ готовим следующий текст на 4-м блоке из phrases.js
                if (typeof loopPhrases !== 'undefined') {
                    const phrase = loopPhrases[textIndex % loopPhrases.length];
                    document.querySelector('#block4 h1').innerText = phrase.title;
                    document.querySelector('#block4 p').innerText = phrase.text;
                    textIndex++;
                }
            }

            // Скроллим к нужному блоку
            const block = document.getElementById('block' + blockNumber);
            block.scrollIntoView({ behavior: 'smooth' });

            currentBlock = blockNumber;
        }

        playBtn.addEventListener('click', () => {
            video.currentTime = 0;
            video.play();
            playBtn.style.display = 'none';
        });

        video.addEventListener('play', () => {
            playBtn.style.display = 'none';
        });
    </script>
</body>

</html>
